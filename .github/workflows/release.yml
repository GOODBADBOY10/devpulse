name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Step 1 — Create the GitHub release first
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: devpulse ${{ github.ref_name }}
          draft: false
          prerelease: false

  # Step 2 — Build binaries and upload to the release
  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: devpulse
            asset_name: devpulse-linux-x64

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: devpulse
            asset_name: devpulse-macos-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: devpulse
            asset_name: devpulse-macos-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: devpulse.exe
            asset_name: devpulse-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/${{ matrix.target }}/release/${{ matrix.binary }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}